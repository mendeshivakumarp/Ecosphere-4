<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recycler Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* RESET */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  background:#f4f7fa;
  color:#334155;
}

/* HEADER */

.header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:60px;
  background:#18a118;
  z-index:1000;
  display:flex;
  align-items:center;
  padding:0 20px;
}

.nav{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nav-left{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo{
  text-decoration:none;
  font-size:1.25rem;
  font-weight:700;
  color:#fff;
}

.logo i{
  color:#ffd700;
  margin-right:6px;
}

.profile-mini a{
  font-size:24px;
  color:#fff;
  text-decoration:none;
}

/* HAMBURGER */

.hamburger{
  display:none;
  background:none;
  border:none;
  color:#fff;
  font-size:22px;
  cursor:pointer;
}

/* OVERLAY */

.overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  z-index:998;
}

.overlay.show{
  display:block;
}

/* DASHBOARD */

.dashboard{
  display:flex;
  margin-top:60px;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:0;
width:210px;
height:100vh;
background:#1b2636;
z-index:999;
display:flex;
flex-direction:column;
padding-top:60px;
transition:0.3s;
}

.sidebar-close{
display:none;
position:absolute;
top:14px;
right:14px;
background:none;
border:none;
color:#fff;
font-size:20px;
cursor:pointer;
}

.sidebar-brand{
padding:18px 20px 16px;
font-size:0.8rem;
font-weight:700;
color:rgba(255,255,255,0.35);
text-transform:uppercase;
letter-spacing:1px;
border-bottom:1px solid rgba(255,255,255,0.06);
margin-bottom:8px;
}

.sidebar a{
display:flex;
align-items:center;
gap:10px;
padding:11px 20px;
color:rgba(255,255,255,0.65);
text-decoration:none;
font-size:0.88rem;
font-weight:500;
transition:0.2s;
}

.sidebar a i{
width:16px;
text-align:center;
}

.sidebar a:hover{
color:#fff;
background:rgba(255,255,255,0.07);
padding-left:26px;
}

.sidebar a.active{
color:#4ade80;
background:rgba(74,222,128,0.1);
}

.sidebar a.logout{
color:rgba(248,113,113,0.8);
margin-bottom:12px;
}

.sidebar a.logout:hover{
color:#f87171;
background:rgba(248,113,113,0.08);
}

/* MAIN */

.main{
  flex:1;
  padding:25px;
  overflow-x:hidden;
  margin-left:210px;
}

/* HEADER CARD */

.dashboard-header{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:25px;
  display:flex;
  align-items:center;
  gap:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.welcome-icon{
  font-size:40px;
  color:#12ba11;
}

.dashboard-header h1{
  font-size:24px;
  color:#1e293b;
}

/* STAT CARDS */

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-bottom:30px;
}

.card{
  background:white;
  padding:25px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);
  transition:0.2s ease;
}

.card:hover{
  transform:translateY(-4px);
}

.card i{
  font-size:28px;
  color:#12ba11;
  margin-bottom:12px;
}

.card h3{
  font-size:14px;
  color:#64748b;
  text-transform:uppercase;
  margin-bottom:8px;
}

.card p{
  font-size:26px;
  font-weight:bold;
  color:#1e293b;
}

/* CHARTS */

.charts-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:25px;
}

.chart-wrapper{
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);
  height:350px;
}

.chart-wrapper h3{
  margin-bottom:15px;
  font-size:16px;
  color:#1e293b;
}

/* FOOTER */

.footer-bottom{
background:#1e293b;
color:#aaa;
padding:16px;
text-align:center;
font-size:14px;
}

/* RESPONSIVE */

@media(max-width:768px){

  .hamburger{
    display:flex;
  }

  .sidebar{
    top:60px;
    transform:translateX(-100%);
    height:calc(100vh - 60px);
  }

  .sidebar.open{
    transform:translateX(0);
  }

  .sidebar-close{
    display:block;
  }

  .main{
    margin-left:0;
    padding:15px;
  }

  .charts-container{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<!-- HEADER -->

<header class="header">

<nav class="nav">

<div class="nav-left">

<button class="hamburger" id="hamburgerBtn">
  <i class="fas fa-bars"></i>
</button>

<a href="./admin.html" class="logo">
  <i class="fas fa-leaf"></i> EcoSphere
</a>

</div>

<div class="profile-mini">

<a href="./recycler_profile.html">
  <i class="fas fa-user-circle"></i>
</a>

</div>

</nav>

</header>

<!-- OVERLAY -->

<div class="overlay" id="overlay"></div>

<!-- DASHBOARD -->

<div class="dashboard">

<!-- SIDEBAR -->

<aside class="sidebar" id="sidebar">

<button class="sidebar-close" id="closeSidebarBtn">
  <i class="fas fa-times"></i>
</button>

<div class="sidebar-brand">
  Recycler Panel
</div>

<a href="./recycler.html" class="active">
  <i class="fas fa-tachometer-alt"></i>
  Dashboard
</a>

<a href="./recycler_orders.html">
  <i class="fas fa-users"></i>
  Orders
</a>

<a href="./recycler_payments.html">
  <i class="fas fa-recycle"></i>
  Payments
</a>

<a href="./abc.html">
  <i class="fas fa-box"></i>
  Buy Materials
</a>

<a href="./card.html">
  <i class="fas fa-shopping-cart"></i>
  Cart
</a>

<a href="index.html" class="logout">
  <i class="fas fa-sign-out-alt"></i>
  Logout
</a>

</aside>

<!-- MAIN -->

<div class="main">

<div class="dashboard-header">

<i class="fas fa-hand-sparkles welcome-icon"></i>

<h1 id="welcomeText">
  Welcome 👋
</h1>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card">
  <i class="fas fa-box"></i>
  <h3>Total Requests</h3>
  <p>24</p>
</div>

<div class="card">
  <i class="fas fa-check-circle"></i>
  <h3>Accepted Orders</h3>
  <p>12</p>
</div>

<div class="card">
  <i class="fas fa-rupee-sign"></i>
  <h3>Total Spend Money</h3>
  <p>₹ 8,500</p>
</div>

</div>

<!-- CHARTS -->

<div class="charts-container">

<div class="chart-wrapper">
  <h3>Requests Overview</h3>
  <canvas id="requestsChart"></canvas>
</div>

<div class="chart-wrapper">
  <h3>Spend vs Requests</h3>
  <canvas id="earningsChart"></canvas>
</div>

</div>

</div>

</div>

<!-- FOOTER -->

<footer class="footer-bottom">
<p>© 2026 EcoSphere. All rights reserved.</p>
</footer>

<script>

/* SIDEBAR */

const hamburgerBtn = document.getElementById("hamburgerBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const closeSidebarBtn = document.getElementById("closeSidebarBtn");

function openSidebar(){
  sidebar.classList.add("open");
  overlay.classList.add("show");
  document.body.style.overflow = "hidden";
}

function closeSidebar(){
  sidebar.classList.remove("open");
  overlay.classList.remove("show");
  document.body.style.overflow = "";
}

function toggleSidebar(){
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");

  if(sidebar.classList.contains("open")){
    document.body.style.overflow = "hidden";
  }else{
    document.body.style.overflow = "";
  }
}

hamburgerBtn.addEventListener("click", toggleSidebar);
overlay.addEventListener("click", closeSidebar);
closeSidebarBtn.addEventListener("click", closeSidebar);

/* CLOSE SIDEBAR ON MOBILE LINK CLICK */

sidebar.querySelectorAll("a").forEach(link=>{
  link.addEventListener("click",()=>{
    if(window.innerWidth <= 768){
      closeSidebar();
    }
  });
});

/* USER NAME */

window.addEventListener("DOMContentLoaded",()=>{

  let name = localStorage.getItem("username");

  if(!name){
    name = prompt("Enter your name:");
    if(name){
      localStorage.setItem("username",name);
    }
  }

  if(name){
    document.getElementById("welcomeText").innerText =
      "Welcome, " + name + " 👋";
  }

});

/* COMMON CHART OPTIONS */

const chartOptions = {
  responsive:true,
  maintainAspectRatio:false,
  plugins:{
    legend:{
      position:'bottom'
    }
  }
};

/* BAR CHART */

new Chart(document.getElementById("requestsChart"),{

  type:"bar",

  data:{
    labels:["Pending","Accepted","Completed"],

    datasets:[{
      label:"Count",
      data:[10,12,5],

      backgroundColor:[
        "#f59e0b",
        "#12ba11",
        "#3b82f6"
      ],

      borderRadius:6
    }]
  },

  options:chartOptions

});

/* DOUGHNUT CHART */

new Chart(document.getElementById("earningsChart"),{

  type:"doughnut",

  data:{
    labels:["Spend Money","Requests"],

    datasets:[{
      data:[8500,2400],

      backgroundColor:[
        "#12ba11",
        "#f59e0b"
      ],

      borderWidth:0
    }]
  },

  options:chartOptions

});

</script>

</body>
</html>

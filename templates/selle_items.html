<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EcoSphere - List Items</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

:root{
  --green:#18a118;
  --green-dark:#138313;
  --green-light:#dcfce7;
  --navy:#1b2636;
  --bg:#f3f5f4;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
  background:var(--bg);
}

/* HEADER */

.header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:60px;
  background:var(--green);
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 20px;
  z-index:1000;
}

.hamburger{
  display:none;
  background:none;
  border:none;
  color:#fff;
  font-size:20px;
  cursor:pointer;
}

.logo{
  flex:1;
  color:#fff;
  font-size:1.2rem;
  font-weight:700;
}

.logo i{
  color:gold;
  margin-right:6px;
}

.profile-link{
  color:#fff;
  font-size:22px;
}

/* OVERLAY */

.overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  z-index:998;
}

.overlay.show{
  display:block;
}

/* SIDEBAR */

.sidebar{
  position:fixed;
  top:0;
  left:0;
  width:210px;
  height:100vh;
  background:#1b2636;
  z-index:999;
  display:flex;
  flex-direction:column;
  padding-top:60px;
  transition:0.3s;
}

.sidebar-close{
  position:absolute;
  top:14px;
  right:14px;
  background:none;
  border:none;
  color:#fff;
  font-size:18px;
  cursor:pointer;
  display:none;
}

.sidebar-brand{
  padding:18px 20px 16px;
  font-size:0.78rem;
  font-weight:700;
  color:rgba(255,255,255,0.4);
  text-transform:uppercase;
  letter-spacing:1px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.sidebar a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 20px;
  color:rgba(255,255,255,0.7);
  text-decoration:none;
  font-size:0.88rem;
  transition:0.2s;
}

.sidebar a:hover{
  background:rgba(255,255,255,0.08);
  color:#fff;
  padding-left:28px;
}

.sidebar a.active{
  background:rgba(74,222,128,0.1);
  color:#4ade80;
}

.sidebar a.logout{
  color:#f87171;
}

/* LAYOUT */

.layout{
  margin-left:220px;
  margin-top:60px;
}

.content{
  padding:25px;
}

/* PAGE TITLE */

.page-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
  flex-wrap:wrap;
  gap:15px;
}

.page-title-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.page-title-icon{
  width:45px;
  height:45px;
  border-radius:10px;
  background:var(--green-light);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--green-dark);
}

.page-title h2 span{
  color:var(--green);
}

/* BUTTON */

.btn-add{
  background:var(--green);
  color:#fff;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

.btn-add:hover{
  background:var(--green-dark);
}

/* GRID */

.items-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
  justify-items:center;
}

/* CARD */

.item-card{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  transition:0.3s;
  width:100%;
  /* max-width:280px; */
  /* height:420px; */
  display:flex;
  flex-direction:column;
}

.item-card:hover{
  transform:translateY(-4px);
}

.item-img-wrap{
  height:180px;
}

.item-img-wrap img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.item-body{
  padding:16px;
  flex:1;
  display:flex;
  flex-direction:column;
}

.item-name{
  font-size:1.1rem;
  font-weight:700;
  margin-bottom:10px;
  color:#111;
}

.item-cat{
  font-size:0.9rem;
  color:#666;
  margin-bottom:12px;
}

.item-meta{
  display:flex;
  justify-content:space-between;
  margin-bottom:14px;
}

.item-price{
  font-size:1rem;
  font-weight:700;
  color:green;
}

.item-actions{
  display:flex;
  gap:8px;
  margin-top:auto;
}

.item-actions button{
  flex:1;
  border:none;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
  font-size:0.85rem;
  font-weight:600;
}

.btn-edit{
  background:#dbeafe;
}

.btn-toggle{
  background:#dcfce7;
}

.btn-delete{
  background:#fee2e2;
}

/* MODAL */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:2000;
}

.modal.show{
  display:flex;
}

.modal-box{
  width:90%;
  max-width:400px;
  background:#fff;
  border-radius:14px;
  padding:22px;
}

.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.close-btn{
  background:none;
  border:none;
  font-size:18px;
  cursor:pointer;
}

#itemForm{
  display:flex;
  flex-direction:column;
  gap:14px;
}

#itemForm input,
#itemForm select{
  padding:11px;
  border:1px solid #d1d5db;
  border-radius:8px;
}

.btn-group{
  display:flex;
  gap:10px;
}

.save-btn{
  flex:1;
  background:#18a118;
  color:#fff;
  border:none;
  padding:11px;
  border-radius:8px;
  cursor:pointer;
}

.cancel-btn{
  flex:1;
  background:#f1f5f9;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* RESPONSIVE */

@media(max-width:768px){

  .hamburger{
    display:block;
  }

  .sidebar{
    transform:translateX(-100%);
  }

  .sidebar.open{
    transform:translateX(0);
  }

  .sidebar-close{
    display:block;
  }

  .layout{
    margin-left:0;
  }

}

</style>
</head>

<body>

<!-- HEADER -->

<header class="header">

<button class="hamburger" onclick="toggleSidebar()">
<i class="fas fa-bars"></i>
</button>

<div class="logo">
<i class="fas fa-leaf"></i> EcoSphere
</div>

<a href="seller_profile.html" class="profile-link">
<i class="fas fa-user-circle"></i>
</a>

</header>

<!-- OVERLAY -->

<div class="overlay" id="overlay"
onclick="closeSidebar()"></div>

<!-- SIDEBAR -->

<aside class="sidebar" id="sidebar">

<button class="sidebar-close"
onclick="closeSidebar()">
<i class="fas fa-times"></i>
</button>

<div class="sidebar-brand">Seller Panel</div>

<a href="seller.html">
<i class="fas fa-home"></i> Dashboard
</a>

<a href="selle_orders.html">
<i class="fas fa-shopping-bag"></i> Orders
</a>

<a href="selle_items.html" class="active">
<i class="fas fa-box"></i> List Items
</a>

<a href="index.html" class="logout">
<i class="fas fa-sign-out-alt"></i> Logout
</a>

</aside>

<!-- MAIN -->

<div class="layout">

<div class="content">

<!-- TITLE -->

<div class="page-title">

<div class="page-title-left">

<div class="page-title-icon">
<i class="fas fa-box-open"></i>
</div>

<h2>Listed <span>Items</span></h2>

</div>

<button class="btn-add"
onclick="openModal()">
<i class="fas fa-plus"></i> Add Item
</button>

</div>

<!-- ITEMS GRID -->

<div class="items-grid" id="itemsGrid">

<!-- CARD -->

<div class="item-card">

<div class="item-img-wrap">
<img src="https://tse4.mm.bing.net/th/id/OIP.RDCmX8JIAoa1EE-n9WBiGwHaFW?cb=thfvnext&rs=1&pid=ImgDetMain&o=7&rm=3">
</div>

<div class="item-body">

<div class="item-name">Plastic Bottles</div>

<div class="item-cat">Plastic</div>

<div class="item-meta">
<div class="item-price">₹10/kg</div>
<div>6kg</div>
</div>

<div class="item-actions">

<button class="btn-edit"
onclick="editItem(this)">
Edit
</button>

<button class="btn-toggle"
onclick="toggleStatus(this)">
Active
</button>

<button class="btn-delete"
onclick="deleteItem(this)">
Delete
</button>

</div>

</div>

</div>

<!-- CARD -->

<div class="item-card">

<div class="item-img-wrap">
<img src="https://5.imimg.com/data5/SELLER/Default/2022/6/VY/BS/TG/79268969/newspaper-waste-500x500.jpg" alt="">
</div>

<div class="item-body">

<div class="item-name">Old Newspapers</div>

<div class="item-cat">Paper</div>

<div class="item-meta">
<div class="item-price">₹12/kg</div>
<div>6kg</div>
</div>

<div class="item-actions">

<button class="btn-edit"
onclick="editItem(this)">
Edit
</button>

<button class="btn-toggle"
onclick="toggleStatus(this)">
Active
</button>

<button class="btn-delete"
onclick="deleteItem(this)">
Delete
</button>

</div>

</div>

</div>

<!-- CARD -->

<div class="item-card">

<div class="item-img-wrap">
<img src="https://img2.exportersindia.com/product_images/bc-full/2023/2/8230165/iron-metal-scrap-1675227906-6742182.jpeg">
</div>

<div class="item-body">

<div class="item-name">Iron Scrap</div>

<div class="item-cat">Metal</div>

<div class="item-meta">
<div class="item-price">₹45/kg</div>
<div>8kg</div>
</div>

<div class="item-actions">

<button class="btn-edit"
onclick="editItem(this)">
Edit
</button>

<button class="btn-toggle"
onclick="toggleStatus(this)">
Active
</button>

<button class="btn-delete"
onclick="deleteItem(this)">
Delete
</button>

</div>

</div>

</div>

<!-- CARD -->

<div class="item-card">

<div class="item-img-wrap">
<img src="https://cdn.prod.website-files.com/61fa355c7ae67c2c0d81a4ec/649d3cbd57c468e5321a5a28_Wine-glass-colors-04.jpg" alt="">
</div>

<div class="item-body">

<div class="item-name">Glass Bottles</div>

<div class="item-cat">Glass</div>

<div class="item-meta">
<div class="item-price">₹45/kg</div>
<div>5kg</div>
</div>

<div class="item-actions">

<button class="btn-edit"
onclick="editItem(this)">
Edit
</button>

<button class="btn-toggle"
onclick="toggleStatus(this)">
Active
</button>

<button class="btn-delete"
onclick="deleteItem(this)">
Delete
</button>

</div>

</div>

</div>


</div>

</div>

</div>

<!-- MODAL -->

<div class="modal" id="itemModal">

<div class="modal-box">

<div class="modal-header">

<h3>Add / Edit Item</h3>

<button class="close-btn"
onclick="closeModal()">
<i class="fas fa-times"></i>
</button>

</div>

<form id="itemForm">

<input type="text"
id="itemName"
placeholder="Item Name"
required>

<select id="itemCategory" required>

<option value="">Select Category</option>
<option>Plastic</option>
<option>Metal</option>
<option>Glass</option>
<option>Paper</option>

</select>

<select id="itemPrice" required>
  <option value="">Select price</option>
  
  
  <option>Copper₹300/kg</option>
  <option>Iron / Steel₹45/kg</option>
  <option>E-Waste₹20/kg</option>
  <option>Plastic₹10/kg</option>
  <option>Paper₹12/kg</option>
  <option>Glass₹18/kg</option>
  <option>Aluminium₹100/kg</option>
  <option>Brass₹25/kg</option>
</select>

<input type="text"
id="itemQty"
placeholder="Quantity"
required>

<input type="file"
id="itemImage"
accept="image/*">

<div class="btn-group">

<button type="submit"
class="save-btn">
Save Item
</button>

<button type="button"
class="cancel-btn"
onclick="closeModal()">
Cancel
</button>

</div>

</form>

</div>

</div>

<script>

/* SIDEBAR */

function toggleSidebar(){

document.getElementById("sidebar")
.classList.toggle("open");

document.getElementById("overlay")
.classList.toggle("show");

}

function closeSidebar(){

document.getElementById("sidebar")
.classList.remove("open");

document.getElementById("overlay")
.classList.remove("show");

}

/* MODAL */

let currentCard = null;
let uploadedImage = "";

function openModal(){

currentCard = null;
uploadedImage = "";

document.getElementById("itemForm")
.reset();

document.getElementById("itemModal")
.classList.add("show");

}

function closeModal(){

document.getElementById("itemModal")
.classList.remove("show");

}

/* IMAGE UPLOAD */

document.getElementById("itemImage")
.addEventListener("change", function(e){

const file = e.target.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(event){

uploadedImage = event.target.result;

};

reader.readAsDataURL(file);

}

});

/* EDIT ITEM */

function editItem(button){

currentCard =
button.closest(".item-card");

const name =
currentCard.querySelector(".item-name")
.innerText;

const category =
currentCard.querySelector(".item-cat")
.innerText;

const price =
currentCard.querySelector(".item-price")
.innerText;

const qty =
currentCard.querySelector(".item-meta div:last-child")
.innerText;

uploadedImage =
currentCard.querySelector("img").src;

document.getElementById("itemName").value = name;

document.getElementById("itemCategory").value = category;

document.getElementById("itemPrice").value = price;

document.getElementById("itemQty").value = qty;

document.getElementById("itemModal")
.classList.add("show");

}

/* SAVE ITEM */

document.getElementById("itemForm")
.addEventListener("submit", function(e){

e.preventDefault();

const name =
document.getElementById("itemName").value;

const category =
document.getElementById("itemCategory").value;

const price =
document.getElementById("itemPrice").value;

const qty =
document.getElementById("itemQty").value;

/* UPDATE */

if(currentCard){

currentCard.querySelector(".item-name")
.innerText = name;

currentCard.querySelector(".item-cat")
.innerText = category;

currentCard.querySelector(".item-price")
.innerText = price;

currentCard.querySelector(".item-meta div:last-child")
.innerText = qty;

currentCard.querySelector("img")
.src = uploadedImage;

}

/* ADD */

else{

const card = document.createElement("div");

card.className = "item-card";

card.innerHTML = `

<div class="item-img-wrap">
<img src="${uploadedImage}">
</div>

<div class="item-body">

<div class="item-name">${name}</div>

<div class="item-cat">${category}</div>

<div class="item-meta">
<div class="item-price">${price}</div>
<div>${qty}</div>
</div>

<div class="item-actions">

<button class="btn-edit"
onclick="editItem(this)">
Edit
</button>

<button class="btn-toggle"
onclick="toggleStatus(this)">
Active
</button>

<button class="btn-delete"
onclick="deleteItem(this)">
Delete
</button>

</div>

</div>

`;

document.getElementById("itemsGrid")
.appendChild(card);

}

closeModal();

document.getElementById("itemForm")
.reset();

});

/* DELETE */

function deleteItem(button){

button.closest(".item-card")
.remove();

}

/* ACTIVE STATUS */

function toggleStatus(button){

if(button.innerText === "Active"){

button.innerText = "Inactive";
button.style.background = "#fee2e2";

}else{

button.innerText = "Active";
button.style.background = "#dcfce7";

}

}

</script>

</body>
</html>

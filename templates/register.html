<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoSphere - Register</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#28a745,#20c997);
    min-height:100vh;
    padding-top:80px;
}

/* NAVBAR */
.header{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(18,186,17,0.95);
    z-index:1000;
}

.nav{
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
}

.logo h1{
    color:#fff;
    font-size:1.8rem;
}

.logo i{
    color:#ffd700;
}

.nav-links{
    list-style:none;
    display:flex;
    gap:25px;
}

.nav-links a{
    color:white;
    text-decoration:none;
    font-weight:500;
    transition:.3s;
}

.nav-links a:hover{
    color:#ffd700;
}

/* REGISTER */
.register-container{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px 15px;
}

.register-card{
    width:100%;
    max-width:700px;
    background:#fff;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
    animation:slideIn .8s ease;
}

.register-card h1{
    text-align:center;
    color:#28a745;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:18px;
    position:relative;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

.form-group i{
    position:absolute;
    left:15px;
    top:43px;
    color:#28a745;
}

.form-group input,
.form-group select{
    width:100%;
    padding:13px 15px 13px 45px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:15px;
    transition:.3s;
}

.form-group input:focus,
.form-group select:focus{
    outline:none;
    border-color:#28a745;
    box-shadow:0 0 8px rgba(40,167,69,.25);
}

.bank-section{
    margin-top:25px;
}

.bank-section h3{
    color:#28a745;
    margin-bottom:15px;
}

.btn-register{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#28a745,#20c997);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.btn-register:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(40,167,69,.3);
}

.login-text{
    text-align:center;
    margin-top:20px;
}

.login-text a{
    text-decoration:none;
    color:#28a745;
    font-weight:600;
}

/* FOOTER */
.footer-bottom{
    text-align:center;
    background:#1a1a1a;
    color:#ccc;
    padding:20px;
    margin-top:40px;
}

/* ANIMATION */
@keyframes slideIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* RESPONSIVE */
@media(max-width:768px){

    .nav{
        flex-direction:column;
        gap:10px;
    }

    .nav-links{
        flex-wrap:wrap;
        justify-content:center;
        gap:15px;
    }

    .register-card{
        padding:25px;
    }

    .register-card h1{
        font-size:1.7rem;
    }

    .subtitle{
        font-size:14px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<header class="header">
    <nav class="nav">
        <div class="logo">
            <h1><i class="fas fa-leaf"></i> EcoSphere</h1>
        </div>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">Login</a></li>
        </ul>
    </nav>
</header>

<!-- REGISTER FORM -->
<div class="register-container">
<div class="register-card">

<h1>Join EcoSphere 🌱</h1>

<p class="subtitle">
Turn waste into opportunity. Register to buy, sell and recycle scrap.
</p>

<form id="registerForm">

<div class="form-group">
<label>Full Name</label>
<i class="fa-solid fa-user"></i>
<input type="text" placeholder="Enter your full name" required>
</div>

<div class="form-group">
<label>Email</label>
<i class="fa-solid fa-envelope"></i>
<input type="email" placeholder="Enter your email" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<i class="fa-solid fa-phone"></i>
<input type="tel" placeholder="Enter your phone number" required>
</div>

<div class="form-group">
<label>Password</label>
<i class="fa-solid fa-lock"></i>
<input type="password"
placeholder="Create password"
required>
</div>

<div class="form-group">
<label>Address</label>
<i class="fa-solid fa-location-dot"></i>
<input type="text" placeholder="Enter your address" required>
</div>

<div class="form-group">
<label>Gender</label>
<i class="fa-solid fa-user"></i>
<select required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="bank-section">
<h3><i class="fa-solid fa-building-columns"></i> Bank Details</h3>

<div class="form-group">
<label>Account Holder Name</label>
<i class="fa-solid fa-user-circle"></i>
<input type="text" placeholder="Account holder name" required>
</div>

<div class="form-group">
<label>Account Number</label>
<i class="fa-solid fa-credit-card"></i>
<input type="text" placeholder="Account number" required>
</div>

<div class="form-group">
<label>IFSC Code</label>
<i class="fa-solid fa-code"></i>
<input type="text"
placeholder="IFSC Code"
oninput="this.value=this.value.toUpperCase()"
required>
</div>

<div class="form-group">
<label>Select Bank</label>
<i class="fa-solid fa-university"></i>

<select onchange="showOtherBank(this.value)" required>
<option value="">Select Bank</option>
<option>SBI</option>
<option>HDFC</option>
<option>ICICI</option>
<option>Axis Bank</option>
<option>Punjab National Bank</option>
<option>Canara Bank</option>
<option value="OTHER">Other</option>
</select>
</div>

<div class="form-group">
<input type="text"
id="otherBank"
placeholder="Enter Bank Name"
style="display:none;">
</div>

</div>

<button type="submit" class="btn-register">
<i class="fa-solid fa-user-plus"></i>
Create Account
</button>

<p class="login-text">
Already have an account?
<a href="#">Login</a>
</p>

</form>

</div>
</div>

<!-- FOOTER -->
<footer>
<div class="footer-bottom">
© 2026 EcoSphere. All Rights Reserved. | Making Sustainability Profitable.
</div>
</footer>

<script>
function showOtherBank(value){
    document.getElementById("otherBank").style.display =
    value === "OTHER" ? "block" : "none";
}

document.getElementById("registerForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    alert(
    "Registration Successful 🌱\nWelcome to EcoSphere!"
    );

    window.location.href="login.html";
});
</script>

</body>
</html>
